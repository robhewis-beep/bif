name: Daily search

on:
  schedule:
    - cron: "10 7 * * *" # 07:10 UTC daily
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call BIF daily cron
        run: |
          curl -sS --fail-with-body -X POST "${{ secrets.CRON_URL }}" \
  -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
  -H "Content-Type: application/json"

